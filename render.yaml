# Render Blueprint — one-click deploy of the warpaint remote MCP server + managed Postgres.
# https://render.com/deploy?repo=https://github.com/arturskowronski/warpaint-cli
databases:
  - name: warpaint-db
    plan: free
    postgresMajorVersion: "16"

services:
  - type: web
    name: warpaint-mcp
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: warpaint-db
          property: connectionString
      - key: PORT
        value: "3000"
